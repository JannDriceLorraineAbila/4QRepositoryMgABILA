<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Projects</title>

  <style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(circle at top left, #ff0000, #0000ff);
  overflow: hidden;
  color: white;
  position: relative;
}

h1 {
  font-size: 3em;
  text-shadow: 3px 3px 20px #000;
  z-index: 10;
}

a {
  display: inline-block;
  padding: 15px 25px;
  margin: 10px;
  background: #ff0000;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
  font-size: 1.2em;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  transition: transform 0.3s, background 0.3s;
  z-index: 10;
}

a:hover {
  background: #c70000;
  transform: translateY(-6px) scale(1.05);
}

body::before, body::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background-image: url('https://i.imgur.com/6fMdbA2.png');
  background-repeat: repeat;
  opacity: 0.15;
  pointer-events: none;
  animation: swing 25s linear infinite;
}

body::after {
  animation-duration: 35s;
  opacity: 0.2;
  box-shadow: 0 0 60px #fff, 0 0 120px #ff0000, 0 0 180px #0000ff;
}

@keyframes swing {
  0% { transform: rotate(0deg) translateX(0px); }
  25% { transform: rotate(8deg) translateX(80px); }
  50% { transform: rotate(0deg) translateX(0px); }
  75% { transform: rotate(-8deg) translateX(-80px); }
  100% { transform: rotate(0deg) translateX(0px); }
}

body span {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.7;
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  50% { opacity: 0.8; }
  100% { transform: translateY(-1000px) translateX(300px); opacity: 0; }
}

@media (max-width: 600px) {
  h1 { font-size: 2em; }
  a { padding: 12px 18px; font-size: 1em; }
}
</style>
</head>
